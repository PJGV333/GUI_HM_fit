name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      channel:
        description: "Canal de release"
        required: true
        default: "beta"
        type: choice
        options:
          - stable
          - beta
      version:
        description: "Version a publicar, por ejemplo 0.1.0 o 0.1.0-beta.2"
        required: false
        type: string

permissions:
  contents: write

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      channel: ${{ steps.meta.outputs.channel }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      release_name: ${{ steps.meta.outputs.release_name }}
      asset_prefix: ${{ steps.meta.outputs.asset_prefix }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - id: meta
        shell: bash
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          INPUT_CHANNEL: ${{ github.event.inputs.channel }}
        run: |
          args=()
          if [[ -n "${INPUT_VERSION}" ]]; then
            args+=(--version "${INPUT_VERSION}")
          fi
          if [[ -n "${INPUT_CHANNEL}" ]]; then
            args+=(--channel "${INPUT_CHANNEL}")
          fi
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            args+=(--tag "${GITHUB_REF_NAME}")
          fi
          python scripts/release_metadata.py "${args[@]}" --github-output "$GITHUB_OUTPUT"

      - name: Validate tag matches version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          expected="v${{ steps.meta.outputs.version }}"
          if [[ "${{ steps.meta.outputs.tag }}" != "$expected" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match hmfit_gui_qt.version.VERSION ($expected)." >&2
            exit 1
          fi

  build-linux:
    needs: meta
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Apply selected version
        shell: bash
        run: python scripts/set_version.py --version "${{ needs.meta.outputs.version }}"

      - name: Install Linux build dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            desktop-file-utils \
            flatpak \
            flatpak-builder \
            fuse \
            git \
            libegl1 \
            libfuse2 \
            libgl1 \
            libxkbcommon-x11-0 \
            patchelf
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.kde.Platform//6.7 org.kde.Sdk//6.7
          python -m pip install --upgrade pip
          python -m pip install -r requirements_qt.txt pyinstaller

      - name: Build AppImage
        shell: bash
        run: |
          mkdir -p dist/release
          chmod +x scripts/build_hmfit_pyside6_appimage.sh packaging/linux/appimage/AppRun
          ./scripts/build_hmfit_pyside6_appimage.sh \
            --source . \
            --out-file "dist/release/${{ needs.meta.outputs.asset_prefix }}-linux-x86_64.AppImage"

      - name: Build Flatpak bundle
        shell: bash
        run: |
          python3 scripts/build_hmfit_flatpak.py \
            --source . \
            --branch "${{ needs.meta.outputs.channel }}" \
            --dest "dist/release/${{ needs.meta.outputs.asset_prefix }}-linux-x86_64.flatpak"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hmfit-linux-release
          path: dist/release/*
          if-no-files-found: error

  build-windows:
    needs: meta
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Apply selected version
        shell: powershell
        run: |
          python scripts/set_version.py --version "${{ needs.meta.outputs.version }}"

      - name: Install Windows build dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements_qt.txt pyinstaller
          choco install innosetup --no-progress -y

      - name: Build portable exe and installer
        shell: powershell
        run: |
          $pythonExe = (Get-Command python).Source
          ./build_windows.ps1 -Target All -PortableOneFile -PythonExe $pythonExe
          New-Item -ItemType Directory -Force -Path dist\release | Out-Null
          Copy-Item dist\hmfit_pyside6_portable.exe "dist\release\${{ needs.meta.outputs.asset_prefix }}-windows-x64-portable.exe"
          Copy-Item dist\installer\hmfit_setup.exe "dist\release\${{ needs.meta.outputs.asset_prefix }}-windows-x64-setup.exe"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hmfit-windows-release
          path: dist/release/*
          if-no-files-found: error

  publish-release:
    needs:
      - meta
      - build-linux
      - build-windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release_artifacts

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.meta.outputs.tag }}
          RELEASE_NAME: ${{ needs.meta.outputs.release_name }}
          PRERELEASE: ${{ needs.meta.outputs.prerelease }}
          GITHUB_SHA_FOR_RELEASE: ${{ github.sha }}
        shell: bash
        run: |
          mapfile -t files < <(find release_artifacts -type f | sort)
          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "No release files were downloaded." >&2
            exit 1
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${files[@]}" --clobber
            exit 0
          fi

          prerelease_flag=""
          if [[ "$PRERELEASE" == "true" ]]; then
            prerelease_flag="--prerelease"
          fi

          gh release create "$TAG" "${files[@]}" \
            --target "$GITHUB_SHA_FOR_RELEASE" \
            --title "$RELEASE_NAME" \
            $prerelease_flag \
            --generate-notes
